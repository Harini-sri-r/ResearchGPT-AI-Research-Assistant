<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites | ResearchGPT</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/favorites.js" defer></script>
</head>
<body class="app-page" data-auth-required="true">
    <div class="app-layout">
        <aside class="sidebar">
            <a class="brand sidebar-brand" href="dashboard.html">
                <img src="assets/logo.png" onerror="this.src='assets/logo.svg'" alt="" class="brand-logo">
                <span>ResearchGPT</span>
            </a>
            <nav class="side-nav" aria-label="Dashboard navigation">
                <a href="dashboard.html"><span>Dashboard</span></a>
                <a href="upload.html"><span>Upload PDF</span></a>
                <a href="mypapers.html"><span>My Papers</span></a>
                <a href="history.html?tab=chat"><span>Chat History</span></a>
                <a href="history.html?tab=search"><span>Search History</span></a>
                <a class="active" href="favorites.html"><span>Favorites</span></a>
                <a href="profile.html"><span>Profile</span></a>
                <button type="button" data-logout><span>Logout</span></button>
            </nav>
        </aside>

        <main class="workspace">
            <header class="workspace-header">
                <div>
                    <p class="eyebrow">Favorites</p>
                    <h1>Saved papers</h1>
                </div>
                <button class="icon-button" type="button" data-theme-toggle aria-label="Toggle theme"></button>
            </header>

            <section class="data-panel full-panel" aria-labelledby="favorites-title">
                <div class="panel-heading">
                    <h2 id="favorites-title">Favorite papers</h2>
                    <button class="button button-ghost" id="refreshFavorites" type="button">Refresh</button>
                </div>
                <form id="favoriteForm" class="inline-form">
                    <input id="favoritePaperName" name="paper_name" type="text" placeholder="Paper filename" autocomplete="off" required>
                    <button class="button button-primary" type="submit" data-loading-label="Adding">
                        <span class="button-label">Add Favorite</span>
                        <span class="spinner" aria-hidden="true"></span>
                    </button>
                </form>
                <div id="favoritesList" class="data-list"></div>
            </section>
        </main>
    </div>
</body>
</html>

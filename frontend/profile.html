<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | ResearchGPT</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/profile.js" defer></script>
</head>
<body class="app-page" data-auth-required="true">
    <div class="app-layout">
        <aside class="sidebar">
            <a class="brand sidebar-brand" href="dashboard.html">
                <img src="assets/logo.png" onerror="this.src='assets/logo.svg'" alt="" class="brand-logo">
                <span>ResearchGPT</span>
            </a>
            <nav class="side-nav" aria-label="Dashboard navigation">
                <a href="dashboard.html"><span>Dashboard</span></a>
                <a href="upload.html"><span>Upload PDF</span></a>
                <a href="mypapers.html"><span>My Papers</span></a>
                <a href="history.html?tab=chat"><span>Chat History</span></a>
                <a href="history.html?tab=search"><span>Search History</span></a>
                <a href="favorites.html"><span>Favorites</span></a>
                <a class="active" href="profile.html"><span>Profile</span></a>
                <button type="button" data-logout><span>Logout</span></button>
            </nav>
        </aside>

        <main class="workspace">
            <header class="workspace-header">
                <div>
                    <p class="eyebrow">Profile</p>
                    <h1>Account</h1>
                </div>
                <button class="icon-button" type="button" data-theme-toggle aria-label="Toggle theme"></button>
            </header>

            <section class="profile-grid">
                <article class="profile-card">
                    <div class="avatar" id="profileAvatar" aria-hidden="true">R</div>
                    <h2 id="profileUsername">Researcher</h2>
                    <p id="profileEmail">Loading...</p>
                    <button class="button button-primary" type="button" data-logout>Logout</button>
                </article>

                <article class="data-panel profile-details" aria-labelledby="details-title">
                    <div class="panel-heading">
                        <h2 id="details-title">Account details</h2>
                    </div>
                    <dl class="detail-list">
                        <div>
                            <dt>Username</dt>
                            <dd id="detailUsername">-</dd>
                        </div>
                        <div>
                            <dt>Email</dt>
                            <dd id="detailEmail">-</dd>
                        </div>
                        <div>
                            <dt>Created at</dt>
                            <dd id="detailCreated">-</dd>
                        </div>
                    </dl>
                </article>
            </section>
        </main>
    </div>
</body>
</html>
